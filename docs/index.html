<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kadir & Esma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --ink: #120b0a;
      --night: #190b0d;
      --wine: #52131b;
      --ember: #ef7a38;
      --gold: #ffd58a;
      --rose: #ff4e6f;
      --cream: #fff5e6;
      --soft: rgba(255, 245, 230, 0.72);
      --line: rgba(255, 213, 138, 0.24);
      --glass: rgba(30, 12, 12, 0.54);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--cream);
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(10, 6, 7, 0.94), rgba(72, 17, 22, 0.74)),
        radial-gradient(circle at 20% 18%, rgba(239, 122, 56, 0.28), transparent 22rem),
        radial-gradient(circle at 80% 80%, rgba(255, 78, 111, 0.18), transparent 28rem),
        #130809;
    }

    button {
      font: inherit;
    }

    .experience {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
      cursor: pointer;
    }

    .backgrounds,
    .scene,
    .welcome {
      position: fixed;
      inset: 0;
    }

    .backgrounds {
      z-index: -3;
      overflow: hidden;
    }

    .background-image {
      position: absolute;
      inset: -6vh -6vw;
      background-image: var(--image);
      background-size: cover;
      background-position: center;
      opacity: 0;
      filter: blur(22px) saturate(1.18) brightness(0.55);
      transform: scale(1.08);
      transition: opacity 1s ease, transform 7s ease;
    }

    .background-image.active {
      opacity: 0.76;
      transform: scale(1.16);
    }

    .veil {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(90deg, rgba(9, 6, 7, 0.72), rgba(9, 6, 7, 0.26) 42%, rgba(9, 6, 7, 0.76)),
        radial-gradient(circle at 50% 55%, transparent 0 22rem, rgba(10, 5, 6, 0.38) 44rem);
      pointer-events: none;
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.12;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 86%);
      pointer-events: none;
    }

    .welcome {
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 26px;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 213, 138, 0.17), transparent 20rem),
        linear-gradient(135deg, rgba(18, 8, 9, 0.96), rgba(82, 19, 27, 0.92));
      transition: opacity 0.9s ease, visibility 0.9s ease, transform 0.9s ease;
    }

    .welcome.hidden {
      opacity: 0;
      visibility: hidden;
      transform: scale(1.04);
    }

    .welcome-inner {
      width: min(760px, 100%);
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 38px;
      height: 1px;
      background: currentColor;
      opacity: 0.6;
    }

    .welcome h1 {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(3.6rem, 11vw, 8.6rem);
      line-height: 0.9;
      text-wrap: balance;
      text-shadow: 0 24px 60px rgba(255, 78, 111, 0.25);
    }

    .start-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 172px;
      margin-top: 34px;
      padding: 15px 24px;
      border: 1px solid rgba(255, 213, 138, 0.46);
      border-radius: 999px;
      color: #2a0d10;
      cursor: pointer;
      background: linear-gradient(135deg, #ffe4a8, #ff6a82);
      box-shadow: 0 22px 70px rgba(255, 78, 111, 0.28);
      font-weight: 900;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .start-button:hover,
    .start-button:focus-visible {
      transform: translateY(-3px);
      box-shadow: 0 28px 82px rgba(255, 78, 111, 0.38);
      outline: none;
    }

    .scene {
      display: grid;
      grid-template-columns: minmax(260px, 0.78fr) minmax(0, 1.22fr);
      gap: clamp(18px, 4vw, 56px);
      align-items: center;
      padding: clamp(18px, 5vw, 70px);
    }

    .story-panel {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: min(720px, calc(100vh - 80px));
      padding: clamp(20px, 3vw, 34px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(160deg, rgba(30, 12, 12, 0.7), rgba(84, 18, 24, 0.38)),
        rgba(16, 8, 8, 0.36);
      box-shadow: 0 26px 90px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .story-top {
      position: relative;
      z-index: 1;
    }

    .story-count {
      color: var(--gold);
      font-size: clamp(2.8rem, 7vw, 5.8rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.88;
    }

    .story-count span {
      color: rgba(255, 245, 230, 0.38);
      font-size: 0.32em;
      letter-spacing: 0;
    }

    .story-title {
      margin: 24px 0 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.1rem, 5vw, 4.6rem);
      line-height: 0.98;
      text-wrap: balance;
    }

    .story-copy {
      width: min(360px, 100%);
      margin: 18px 0 0;
      color: var(--soft);
      font-size: clamp(0.98rem, 1.6vw, 1.08rem);
      line-height: 1.8;
    }

    .controls {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 16px;
    }

    .hint {
      color: rgba(255, 245, 230, 0.64);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .progress-ring {
      width: 58px;
      height: 58px;
      transform: rotate(-90deg);
    }

    .progress-ring circle {
      fill: none;
      stroke-width: 5;
    }

    .progress-ring .track {
      stroke: rgba(255, 245, 230, 0.14);
    }

    .progress-ring .fill {
      stroke: var(--gold);
      stroke-linecap: round;
      stroke-dasharray: 157;
      stroke-dashoffset: 157;
    }

    .dots {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 7px;
      width: min(260px, 100%);
    }

    .dot {
      height: 4px;
      border-radius: 99px;
      background: rgba(255, 245, 230, 0.2);
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .dot.active {
      background: linear-gradient(90deg, var(--gold), var(--rose));
      transform: scaleY(1.8);
    }

    .stage {
      position: relative;
      min-height: min(720px, calc(100vh - 80px));
      display: grid;
      place-items: center;
    }

    .map-line {
      position: absolute;
      inset: 10% 0 9%;
      width: 100%;
      height: 80%;
      opacity: 0.76;
      pointer-events: none;
      filter: drop-shadow(0 0 18px rgba(255, 94, 77, 0.6));
    }

    .map-line path {
      fill: none;
      stroke: url(#lineGradient);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 18 18;
      animation: lineMove 1.8s linear infinite;
    }

    .photo-shell {
      position: relative;
      width: min(88%, 690px);
      aspect-ratio: 3 / 2;
      display: grid;
      place-items: center;
      transform: translateY(0) rotate(-1.5deg);
      transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .photo-shell::before,
    .photo-shell::after {
      content: "";
      position: absolute;
      border-radius: 28px;
      pointer-events: none;
    }

    .photo-shell::before {
      inset: -18px;
      border: 1px solid rgba(255, 213, 138, 0.22);
      transform: rotate(2.2deg);
    }

    .photo-shell::after {
      inset: 18px;
      border: 1px solid rgba(255, 245, 230, 0.2);
      transform: rotate(-1.8deg);
    }

    .story-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border: 1px solid rgba(255, 245, 230, 0.26);
      border-radius: 24px;
      background: #1a0c0d;
      box-shadow:
        0 38px 110px rgba(0, 0, 0, 0.48),
        0 0 0 10px rgba(255, 245, 230, 0.04);
      transform: scale(0.98);
      opacity: 0;
      transition: opacity 0.65s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.8s ease;
    }

    .story-image.ready {
      opacity: 1;
      transform: scale(1);
    }

    .photo-shell.switching {
      transform: translateY(14px) rotate(1.2deg) scale(0.985);
    }

    .photo-shell.switching .story-image {
      opacity: 0;
      transform: scale(0.94);
      filter: blur(6px);
    }

    .caption-chip {
      position: absolute;
      top: clamp(12px, 2vw, 22px);
      right: clamp(12px, 2vw, 22px);
      max-width: min(430px, calc(100% - 28px));
      padding: 13px 16px;
      border: 1px solid rgba(255, 213, 138, 0.25);
      border-radius: 999px;
      background: rgba(14, 8, 8, 0.62);
      color: rgba(255, 245, 230, 0.86);
      font-size: 0.86rem;
      font-weight: 800;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    .corner-actions {
      position: fixed;
      left: clamp(14px, 3vw, 34px);
      right: clamp(14px, 3vw, 34px);
      top: clamp(12px, 2vw, 22px);
      z-index: 7;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      pointer-events: none;
    }

    .corner-button {
      pointer-events: auto;
      width: 100%;
      min-height: 54px;
      padding: 14px 18px;
      border: 1px solid rgba(255, 213, 138, 0.36);
      border-radius: 999px;
      color: var(--cream);
      cursor: pointer;
      background:
        linear-gradient(135deg, rgba(30, 12, 12, 0.76), rgba(82, 19, 27, 0.72)),
        rgba(18, 8, 9, 0.72);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
      font-size: 0.9rem;
      font-weight: 900;
      text-align: center;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .corner-button:hover,
    .corner-button:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(255, 213, 138, 0.74);
      box-shadow: 0 24px 64px rgba(255, 78, 111, 0.24);
      outline: none;
    }

    .nav {
      position: fixed;
      right: clamp(16px, 3vw, 34px);
      bottom: clamp(78px, 8vw, 104px);
      z-index: 6;
      display: flex;
      gap: 10px;
    }

    .nav button {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255, 213, 138, 0.32);
      border-radius: 50%;
      color: var(--cream);
      cursor: pointer;
      background: rgba(18, 8, 9, 0.66);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .nav button:hover,
    .nav button:focus-visible {
      transform: translateY(-2px);
      background: rgba(82, 19, 27, 0.84);
      outline: none;
    }

    .heart {
      position: fixed;
      z-index: 3;
      left: var(--x);
      top: var(--y);
      color: var(--gold);
      font-size: var(--size);
      line-height: 1;
      pointer-events: none;
      opacity: 0;
      filter: drop-shadow(0 8px 18px rgba(255, 78, 111, 0.32));
      animation: floatHeart 1.5s ease-out forwards;
    }

    .butterfly,
    .flower {
      position: fixed;
      z-index: 8;
      left: var(--x);
      top: var(--y);
      pointer-events: none;
      opacity: 0;
    }

    .butterfly {
      width: var(--size);
      height: calc(var(--size) * 0.72);
      filter: drop-shadow(0 10px 18px rgba(255, 213, 138, 0.36));
      animation: butterflyFlight 2.5s ease-out forwards;
    }

    .butterfly::before,
    .butterfly::after {
      content: "";
      position: absolute;
      top: 0;
      width: 55%;
      height: 100%;
      background:
        radial-gradient(circle at 42% 38%, rgba(255, 245, 230, 0.9) 0 10%, transparent 12%),
        linear-gradient(145deg, #ffd58a, #ff4e6f 68%, #ef7a38);
    }

    .butterfly::before {
      left: 0;
      border-radius: 76% 24% 68% 32%;
      transform: rotate(-18deg);
      transform-origin: right center;
    }

    .butterfly::after {
      right: 0;
      border-radius: 24% 76% 32% 68%;
      transform: rotate(18deg);
      transform-origin: left center;
    }

    .flower {
      width: var(--size);
      height: var(--size);
      transform: translate(-50%, -50%) scale(0.2) rotate(var(--rotate));
      animation: flowerBloom 2.25s ease-out forwards;
    }

    .dream-name {
      position: fixed;
      z-index: 8;
      left: var(--x);
      top: var(--y);
      color: var(--cream);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: var(--size);
      font-weight: 700;
      letter-spacing: 0.08em;
      pointer-events: none;
      opacity: 0;
      text-shadow:
        0 0 16px rgba(255, 213, 138, 0.82),
        0 0 34px rgba(255, 78, 111, 0.48);
      animation: dreamFloat 2.7s ease-out forwards;
    }

    .flower::before,
    .flower::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #ffe4a8 0 14%, transparent 16%),
        radial-gradient(circle at 50% 12%, #ff7d98 0 18%, transparent 19%),
        radial-gradient(circle at 87% 50%, #ff5f83 0 18%, transparent 19%),
        radial-gradient(circle at 50% 88%, #ff9bb0 0 18%, transparent 19%),
        radial-gradient(circle at 13% 50%, #ff6e8e 0 18%, transparent 19%);
    }

    .flower::after {
      transform: rotate(45deg);
      opacity: 0.78;
    }

    .letter-launch {
      position: fixed;
      left: 50%;
      bottom: clamp(20px, 4vw, 42px);
      transform: translateX(-50%);
      z-index: 12;
      width: min(520px, calc(100vw - 28px));
      padding: 14px 18px;
      border: 1px solid rgba(255, 213, 138, 0.34);
      border-radius: 24px;
      color: var(--cream);
      cursor: pointer;
      background:
        linear-gradient(135deg, rgba(30, 12, 12, 0.76), rgba(82, 19, 27, 0.7)),
        rgba(18, 8, 9, 0.68);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: center;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .letter-launch:hover,
    .letter-launch:focus-visible {
      transform: translateX(-50%) translateY(-3px);
      border-color: rgba(255, 213, 138, 0.72);
      box-shadow: 0 24px 64px rgba(255, 78, 111, 0.24);
      outline: none;
    }

    .letter-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 18px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.35s ease, visibility 0.35s ease;
      background:
        radial-gradient(circle at 20% 12%, rgba(255, 213, 138, 0.2), transparent 16rem),
        radial-gradient(circle at 82% 16%, rgba(255, 78, 111, 0.18), transparent 18rem),
        linear-gradient(135deg, rgba(18, 8, 9, 0.92), rgba(54, 13, 19, 0.92));
    }

    .letter-overlay.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .letter-card {
      position: relative;
      width: min(860px, 100%);
      max-height: min(88vh, 920px);
      padding: clamp(24px, 4vw, 48px);
      border-radius: 30px;
      border: 1px solid rgba(255, 233, 189, 0.26);
      background:
        linear-gradient(160deg, rgba(255, 249, 241, 0.98), rgba(255, 234, 216, 0.96)),
        #fff7ef;
      color: #4a2732;
      box-shadow: 0 32px 110px rgba(0, 0, 0, 0.42);
      overflow: hidden;
      transform: translateY(24px) scale(0.98);
      transition: transform 0.35s ease;
    }

    .letter-overlay.open .letter-card {
      transform: translateY(0) scale(1);
    }

    .letter-card::before,
    .letter-card::after {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 210, 225, 0.92) 0 16%, transparent 17%),
        radial-gradient(circle at 50% 16%, #ff9bb0 0 19%, transparent 20%),
        radial-gradient(circle at 84% 50%, #ff7e9a 0 19%, transparent 20%),
        radial-gradient(circle at 50% 84%, #ffd58a 0 19%, transparent 20%),
        radial-gradient(circle at 16% 50%, #ff6f88 0 19%, transparent 20%);
      filter: drop-shadow(0 8px 20px rgba(255, 78, 111, 0.2));
      opacity: 0.95;
    }

    .letter-card::before {
      top: -18px;
      left: -18px;
    }

    .letter-card::after {
      right: -18px;
      bottom: -18px;
      transform: rotate(20deg);
    }

    .letter-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      color: #4a2732;
      cursor: pointer;
      background: rgba(255, 213, 138, 0.9);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.14);
      font-size: 1.2rem;
      font-weight: 900;
    }

    .letter-meta {
      color: #b62268;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.78rem;
      margin-bottom: 14px;
    }

    .letter-card h2 {
      margin: 0 0 16px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      line-height: 0.95;
      color: #8f123e;
    }

    .letter-body {
      margin: 0;
      font-size: clamp(1.02rem, 2vw, 1.2rem);
      line-height: 2;
      color: #4a2732;
      white-space: pre-line;
    }

    .letter-sign {
      margin-top: 22px;
      color: #b62268;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 2.1rem;
      text-align: right;
    }

    @keyframes lineMove {
      to {
        stroke-dashoffset: -72;
      }
    }

    @keyframes floatHeart {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) scale(0.5) rotate(0deg);
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--dx), var(--dy), 0) scale(1.3) rotate(var(--rotate));
      }
    }

    @keyframes butterflyFlight {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) scale(0.55) rotate(-14deg);
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--dx), var(--dy), 0) scale(1.18) rotate(var(--rotate));
      }
    }

    @keyframes flowerBloom {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.15) rotate(var(--rotate));
      }
      24% {
        opacity: 1;
      }
      76% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.08) rotate(calc(var(--rotate) + 28deg));
      }
    }

    @keyframes dreamFloat {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) scale(0.72) rotate(-5deg);
      }
      18% {
        opacity: 1;
      }
      76% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--dx), var(--dy), 0) scale(1.12) rotate(var(--rotate));
      }
    }

    @media (max-width: 920px) {
      body {
        overflow-y: auto;
      }

      .experience {
        min-height: 100svh;
      }

      .scene {
        position: relative;
        min-height: 100svh;
        grid-template-columns: 1fr;
        align-content: center;
        padding: 18px;
      }

      .story-panel {
        order: 2;
        min-height: auto;
        border-radius: 22px;
      }

      .stage {
        order: 1;
        min-height: auto;
        padding-top: 28px;
      }

      .photo-shell {
        width: min(92%, 620px);
      }

      .story-copy {
        width: 100%;
      }

      .nav {
        right: 16px;
        bottom: 86px;
      }
    }

    @media (max-width: 560px) {
      html,
      body {
        min-height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .experience {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        padding-bottom: 12px;
      }

      .welcome h1 {
        font-size: clamp(2.8rem, 15vw, 4.4rem);
        line-height: 0.92;
      }

      .corner-actions {
        position: static;
        order: 1;
        left: auto;
        right: auto;
        top: auto;
        width: 100%;
        padding: 10px 10px 0;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .corner-button {
        min-height: 40px;
        padding: 8px 10px;
        border-radius: 14px;
        font-size: 0.62rem;
        line-height: 1.15;
      }

      .scene {
        order: 2;
        flex: 0 0 auto;
        gap: 12px;
        padding: 10px 10px 8px;
        min-height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        align-content: start;
      }

      .story-panel {
        order: 2;
        min-height: auto;
        padding: 12px 12px 10px;
        border-radius: 18px;
      }

      .stage {
        order: 1;
        min-height: auto;
        padding-top: 0;
      }

      .story-count {
        font-size: clamp(2rem, 10vw, 3rem);
      }

      .story-title {
        margin-top: 10px;
        font-size: clamp(1.45rem, 6vw, 2.1rem);
      }

      .story-copy {
        margin-top: 10px;
        font-size: 0.86rem;
        line-height: 1.55;
      }

      .progress-row {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }

      .progress-ring {
        width: 44px;
        height: 44px;
      }

      .dots {
        width: 100%;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        gap: 5px;
      }

      .caption-chip {
        top: 10px;
        right: 10px;
        max-width: calc(100% - 20px);
        border-radius: 16px;
        font-size: 0.66rem;
        padding: 10px 12px;
      }

      .photo-shell {
        order: 1;
        width: min(100%, 390px);
        aspect-ratio: 3 / 2;
        transform: translateY(0) rotate(-0.4deg);
      }

      .story-image {
        object-fit: contain;
        background: rgba(18, 8, 9, 0.86);
      }

      .photo-shell::before,
      .photo-shell::after,
      .map-line {
        display: none;
      }

      #butterflyButton {
        order: 1;
        grid-column: auto;
      }

      #flowerButton {
        order: 2;
        grid-column: auto;
      }

      #dreamButton {
        order: 3;
        grid-column: auto;
      }

      .nav {
        order: 4;
        position: static;
        right: auto;
        bottom: auto;
        align-self: flex-end;
        margin: 4px 10px 6px auto;
        gap: 8px;
      }

      .nav button {
        width: 40px;
        height: 40px;
      }

      .letter-launch {
        order: 3;
        position: static;
        left: auto;
        bottom: auto;
        width: calc(100% - 20px);
        margin: 4px 10px 0;
        transform: none;
        font-size: 0.9rem;
        padding: 10px 12px;
      }

      .letter-card {
        width: min(100%, 560px);
        max-height: 86vh;
        padding: 20px 18px;
        border-radius: 24px;
      }

      .letter-card::before,
      .letter-card::after {
        width: 68px;
        height: 68px;
      }

      .letter-body {
        font-size: 0.92rem;
        line-height: 1.72;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="experience" id="experience" aria-live="polite">
    <div class="backgrounds" id="backgrounds"></div>
    <div class="veil"></div>
    <div class="grain"></div>

    <section class="welcome" id="welcome">
      <div class="welcome-inner">
        <div class="eyebrow">Kadir & Esma</div>
        <h1>Hazır mısın sevgilim?</h1>
        <button class="start-button" id="startButton" type="button">Başlayalım</button>
      </div>
    </section>

    <section class="scene" aria-label="Kadir ve Esma hikayesi">
      <aside class="story-panel">
        <div class="story-top">
          <div class="story-count"><strong id="sceneNumber">01</strong> <span>/ 16</span></div>
          <h2 class="story-title" id="sceneTitle">Bir hikaye açılıyor</h2>
          <p class="story-copy" id="sceneCopy">Her dokunuşta yeni bir anı, her karede bize çıkan küçük bir yol var.</p>
        </div>

        <div class="controls">
          <div class="hint">Ekrana tıkla ya da bekle; hikaye kendiliğinden devam eder.</div>
          <div class="progress-row">
            <svg class="progress-ring" viewBox="0 0 58 58" aria-hidden="true">
              <circle class="track" cx="29" cy="29" r="25"></circle>
              <circle class="fill" id="progressFill" cx="29" cy="29" r="25"></circle>
            </svg>
            <div class="dots" id="dots"></div>
          </div>
        </div>
      </aside>

      <div class="stage">
        <svg class="map-line" viewBox="0 0 800 420" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ffd58a"></stop>
              <stop offset="48%" stop-color="#ff4e6f"></stop>
              <stop offset="100%" stop-color="#ef7a38"></stop>
            </linearGradient>
          </defs>
          <path d="M60 330 C180 120 294 354 404 208 C516 58 594 270 742 80"></path>
        </svg>
        <figure class="photo-shell" id="photoShell">
          <img class="story-image" id="storyImage" src="./img/16-foto-kirpildi/foto-01.jpeg" alt="Kadir ve Esma hikayesi 1. kare" />
          <figcaption class="caption-chip" id="captionChip">Kırşehir'de başlayan küçük ışık.</figcaption>
        </figure>
      </div>
    </section>

    <nav class="nav" aria-label="Hikaye kontrolü">
      <button type="button" id="previousButton" aria-label="Önceki kare">‹</button>
      <button type="button" id="nextButton" aria-label="Sonraki kare">›</button>
    </nav>

    <div class="corner-actions" aria-label="Küçük sürprizler">
      <button class="corner-button" id="butterflyButton" type="button">Seninle tanıştıktan sonra midemi görmek ister misin?</button>
      <button class="corner-button" id="dreamButton" type="button">Hayallerimi görmek ister misin?</button>
      <button class="corner-button" id="flowerButton" type="button">Seninle tanıştıktan sonra kalbimi görmek ister misin?</button>
    </div>

    <button class="letter-launch" id="letterLaunch" type="button">Altta bir mektup sakladım. Tıklayınca açılır.</button>

    <section class="letter-overlay" id="letterOverlay" aria-hidden="true">
      <article class="letter-card" role="dialog" aria-modal="true" aria-label="Mektup">
        <button class="letter-close" id="letterClose" type="button" aria-label="Mektubu kapat">×</button>
        <div class="letter-meta">Sadece sana</div>
        <h2>Sevgilim</h2>
        <p class="letter-body" id="letterBody"></p>
        <div class="letter-sign">Kadir</div>
      </article>
    </section>
  </main>

  <script>
    const slideDuration = 15000;
    const imageBase = "./img/16-foto-kirpildi/";
    const slides = [
      {
        file: "foto-01.jpeg",
        title: "Türkiye ışıkları yandı",
        copy: "Her güzel hikaye önce uzaktan görünür; sonra yavaşça kalbin merkezine yaklaşır.",
        caption: "Haritanın üstünde ilk işaret."
      },
      {
        file: "foto-02.jpeg",
        title: "Her şey burada başladı",
        copy: "Kırşehir sadece bir şehir değil, bizim hikayemizin ilk cümlesi oldu.",
        caption: "Başlangıcın adı: Kırşehir."
      },
      {
        file: "foto-03.jpeg",
        title: "Aynı şehir, aynı tesadüf",
        copy: "İki kalp aynı yere düşünce tesadüf olmaktan çıkıp kader gibi hissettirir.",
        caption: "Kadir ve Esma yan yana."
      },
      {
        file: "foto-04.jpeg",
        title: "Birkaç sokak kadar yakın",
        copy: "Aramızda yollar vardı ama kalbimiz birbirinin yerini çoktan ezberlemişti.",
        caption: "Yakınlığın en güzel hali."
      },
      {
        file: "foto-05.jpeg",
        title: "Yollar ayrıldı sandık",
        copy: "Bazı yollar uzaklaştırmaz; sadece kavuşmayı daha anlamlı yapar.",
        caption: "Farklı şehirler, aynı yön."
      },
      {
        file: "foto-06.jpeg",
        title: "Manisa ve İzmir arasında",
        copy: "Ben Manisa'ya giderken hikaye durmadı; sadece yeni bir bölüm açıldı.",
        caption: "İki şehir, tek bağ."
      },
      {
        file: "foto-07.jpeg",
        title: "Sen İzmir'e",
        copy: "Bir şehrin adı, sevdiğin insan oradaysa bambaşka duyulur.",
        caption: "İzmir artık sadece İzmir değil."
      },
      {
        file: "foto-08.jpeg",
        title: "38 kilometrelik yakınlık",
        copy: "Bazen mesafe rakamla ölçülür, özlemse kalbin attığı yerden.",
        caption: "Manisa ile İzmir arasında sıcak bir çizgi."
      },
      {
        file: "foto-09.jpeg",
        title: "Zaman geçti",
        copy: "Saatler aktı, günler değişti; ama bağımız aynı yerde güçlü kaldı.",
        caption: "Kalbin saati başka çalışır."
      },
      {
        file: "foto-10.jpeg",
        title: "İzmir'den Kırşehir'e",
        copy: "Haritada uzak görünen her yer, sen varsın diye yakın gelmeye başladı.",
        caption: "Kalpler kendi yolunu bulur."
      },
      {
        file: "foto-11.jpeg",
        title: "736 kilometre bile yetmedi",
        copy: "Mesafe büyüdü belki, ama sevgimiz ondan daha hızlı büyüdü.",
        caption: "Uzaklığın üstünden geçen ışık."
      },
      {
        file: "foto-12.jpeg",
        title: "Özlem büyüdü",
        copy: "Uzakta olmak bazen zor; ama seni sevmek her şeyi daha dayanılır yapıyor.",
        caption: "Aynı gökyüzünün altında."
      },
      {
        file: "foto-13.jpeg",
        title: "Manisa'ya dönüş vakti",
        copy: "Yeniden yaklaşan yollar var; insanın içini heyecanla dolduran cinsten.",
        caption: "Dönüş yolu da hikayenin parçası."
      },
      {
        file: "foto-14.jpeg",
        title: "Biraz daha yaklaşmak",
        copy: "Her kilometre azaldıkça içimdeki sabırsızlık daha güzel bir şeye dönüştü.",
        caption: "Kavuşmaya yaklaşan çizgi."
      },
      {
        file: "foto-15.jpeg",
        title: "Artık günleri sayıyorum",
        copy: "Mesafeyi değil, birlikte geçireceğimiz anları saymak istiyorum.",
        caption: "Yakınlığın bekleyişi."
      },
      {
        file: "foto-16.jpeg",
        title: "Seni çok seviyorum Esma",
        copy: "Mesafeler geçer. Gerçek sevgi, birbirine giden yolu daima bulur.",
        caption: "Kadir ve Esma."
      }
    ];

    const welcome = document.getElementById("welcome");
    const startButton = document.getElementById("startButton");
    const experience = document.getElementById("experience");
    const backgrounds = document.getElementById("backgrounds");
    const sceneNumber = document.getElementById("sceneNumber");
    const sceneTitle = document.getElementById("sceneTitle");
    const sceneCopy = document.getElementById("sceneCopy");
    const captionChip = document.getElementById("captionChip");
    const storyImage = document.getElementById("storyImage");
    const photoShell = document.getElementById("photoShell");
    const dots = document.getElementById("dots");
    const progressFill = document.getElementById("progressFill");
    const previousButton = document.getElementById("previousButton");
    const nextButton = document.getElementById("nextButton");
    const butterflyButton = document.getElementById("butterflyButton");
    const dreamButton = document.getElementById("dreamButton");
    const flowerButton = document.getElementById("flowerButton");
    const letterLaunch = document.getElementById("letterLaunch");
    const letterOverlay = document.getElementById("letterOverlay");
    const letterClose = document.getElementById("letterClose");
    const letterBody = document.getElementById("letterBody");

    const letterText = [
      "Sevgilim,\n\nSabah uyandın ve bu web sitesini açtın.",
      "Gözlerin sabahları çok güzel oluyor. Sen zaten ayrı bir güzelsin.",
      "Seni çok özledim.",
      "Seninle kavuşacağımız günü iple çekiyorum. Hemen gelsin istiyorum.",
      "Sana sımsıkı sarılacağım, söz veriyorum.",
      "Günaydın aşkım."
    ].join("\n\n");

    let currentIndex = 0;
    let hasStarted = false;
    let timer = null;
    let progressStart = performance.now();
    const circumference = 157;

    slides.forEach((slide, index) => {
      const background = document.createElement("div");
      background.className = "background-image";
      background.style.setProperty("--image", `url("${imageBase}${slide.file}")`);
      background.dataset.index = String(index);
      backgrounds.appendChild(background);

      const dot = document.createElement("span");
      dot.className = "dot";
      dots.appendChild(dot);

      const preload = new Image();
      preload.src = imageBase + slide.file;
    });

    letterBody.textContent = letterText;

    function padNumber(value) {
      return String(value).padStart(2, "0");
    }

    function activateBackground(index) {
      document.querySelectorAll(".background-image").forEach((item) => {
        item.classList.toggle("active", Number(item.dataset.index) === index);
      });
    }

    function updateDots(index) {
      document.querySelectorAll(".dot").forEach((dot, dotIndex) => {
        dot.classList.toggle("active", dotIndex === index);
      });
    }

    function setSlide(index, direction = 1) {
      currentIndex = (index + slides.length) % slides.length;
      const slide = slides[currentIndex];

      photoShell.classList.add("switching");

      window.setTimeout(() => {
        storyImage.classList.remove("ready");
        storyImage.onload = () => {
          storyImage.classList.add("ready");
          photoShell.classList.remove("switching");
        };
        storyImage.src = imageBase + slide.file;
        storyImage.alt = `Kadir ve Esma hikayesi ${currentIndex + 1}. kare`;
        sceneNumber.textContent = padNumber(currentIndex + 1);
        sceneTitle.textContent = slide.title;
        sceneCopy.textContent = slide.copy;
        captionChip.textContent = slide.caption;
        activateBackground(currentIndex);
        updateDots(currentIndex);
        progressStart = performance.now();
        if (storyImage.complete) {
          storyImage.classList.add("ready");
          photoShell.classList.remove("switching");
        }
        createHearts(direction);
      }, 280);
    }

    function nextSlide() {
      setSlide(currentIndex + 1, 1);
      restartTimer();
    }

    function previousSlide() {
      setSlide(currentIndex - 1, -1);
      restartTimer();
    }

    function restartTimer() {
      if (!hasStarted) return;
      window.clearTimeout(timer);
      progressStart = performance.now();
      timer = window.setTimeout(nextSlide, slideDuration);
    }

    function animateProgress(now) {
      const elapsed = hasStarted ? Math.min(now - progressStart, slideDuration) : 0;
      const progress = elapsed / slideDuration;
      progressFill.style.strokeDashoffset = String(circumference - circumference * progress);
      requestAnimationFrame(animateProgress);
    }

    function createHearts(direction) {
      for (let index = 0; index < 8; index++) {
        const heart = document.createElement("span");
        heart.className = "heart";
        heart.textContent = "♥";
        heart.style.setProperty("--x", `${Math.random() * 82 + 8}vw`);
        heart.style.setProperty("--y", `${Math.random() * 72 + 14}vh`);
        heart.style.setProperty("--dx", `${(Math.random() * 90 + 40) * direction}px`);
        heart.style.setProperty("--dy", `${Math.random() * -130 - 40}px`);
        heart.style.setProperty("--rotate", `${Math.random() * 140 - 70}deg`);
        heart.style.setProperty("--size", `${Math.random() * 16 + 16}px`);
        document.body.appendChild(heart);
        window.setTimeout(() => heart.remove(), 1600);
      }
    }

    function createButterflies(origin) {
      const rect = origin.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      for (let index = 0; index < 16; index++) {
        const butterfly = document.createElement("span");
        const direction = index % 2 === 0 ? 1 : -1;

        butterfly.className = "butterfly";
        butterfly.style.setProperty("--x", `${centerX + (Math.random() - 0.5) * 42}px`);
        butterfly.style.setProperty("--y", `${centerY + (Math.random() - 0.5) * 22}px`);
        butterfly.style.setProperty("--dx", `${(Math.random() * 170 + 70) * direction}px`);
        butterfly.style.setProperty("--dy", `${Math.random() * -190 - 70}px`);
        butterfly.style.setProperty("--rotate", `${Math.random() * 180 - 90}deg`);
        butterfly.style.setProperty("--size", `${Math.random() * 15 + 18}px`);
        document.body.appendChild(butterfly);
        window.setTimeout(() => butterfly.remove(), 2600);
      }
    }

    function createFlowers(origin) {
      const rect = origin.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      for (let index = 0; index < 18; index++) {
        const flower = document.createElement("span");
        const angle = (Math.PI * 2 * index) / 18;
        const distance = Math.random() * 82 + 30;

        flower.className = "flower";
        flower.style.setProperty("--x", `${centerX + Math.cos(angle) * 24}px`);
        flower.style.setProperty("--y", `${centerY + Math.sin(angle) * 10}px`);
        flower.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
        flower.style.setProperty("--dy", `${Math.sin(angle) * distance - 38}px`);
        flower.style.setProperty("--rotate", `${Math.random() * 140 - 70}deg`);
        flower.style.setProperty("--size", `${Math.random() * 18 + 26}px`);
        document.body.appendChild(flower);
        window.setTimeout(() => flower.remove(), 2400);
      }
    }

    function createDreamWords(origin) {
      const rect = origin.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const letters = ["E", "S", "M", "A"];

      for (let index = 0; index < 20; index++) {
        const dreamName = document.createElement("span");
        const letter = letters[index % letters.length];
        const angle = (Math.PI * 2 * index) / 20;
        const distance = Math.random() * 110 + 46;

        dreamName.className = "dream-name";
        dreamName.textContent = letter;
        dreamName.style.setProperty("--x", `${centerX + Math.cos(angle) * 8}px`);
        dreamName.style.setProperty("--y", `${centerY + Math.sin(angle) * 8}px`);
        dreamName.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
        dreamName.style.setProperty("--dy", `${Math.sin(angle) * distance - 72}px`);
        dreamName.style.setProperty("--rotate", `${Math.random() * 160 - 80}deg`);
        dreamName.style.setProperty("--size", `${Math.random() * 20 + 20}px`);
        document.body.appendChild(dreamName);
        window.setTimeout(() => dreamName.remove(), 2700);
      }
    }

    function openLetter() {
      letterOverlay.classList.add("open");
      letterOverlay.setAttribute("aria-hidden", "false");
      createFlowers(letterLaunch);
    }

    function closeLetter() {
      letterOverlay.classList.remove("open");
      letterOverlay.setAttribute("aria-hidden", "true");
    }

    function startExperience() {
      hasStarted = true;
      welcome.classList.add("hidden");
      storyImage.classList.add("ready");
      setSlide(0, 1);
      restartTimer();
    }

    startButton.addEventListener("click", (event) => {
      event.stopPropagation();
      startExperience();
    });

    nextButton.addEventListener("click", (event) => {
      event.stopPropagation();
      nextSlide();
    });

    previousButton.addEventListener("click", (event) => {
      event.stopPropagation();
      previousSlide();
    });

    butterflyButton.addEventListener("click", (event) => {
      event.stopPropagation();
      createButterflies(butterflyButton);
    });

    dreamButton.addEventListener("click", (event) => {
      event.stopPropagation();
      createDreamWords(dreamButton);
    });

    flowerButton.addEventListener("click", (event) => {
      event.stopPropagation();
      createFlowers(flowerButton);
    });

    letterLaunch.addEventListener("click", (event) => {
      event.stopPropagation();
      openLetter();
    });

    letterClose.addEventListener("click", (event) => {
      event.stopPropagation();
      closeLetter();
    });

    letterOverlay.addEventListener("click", (event) => {
      if (event.target === letterOverlay) closeLetter();
    });

    experience.addEventListener("click", () => {
      if (!hasStarted) {
        startExperience();
        return;
      }
      nextSlide();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && letterOverlay.classList.contains("open")) {
        event.preventDefault();
        closeLetter();
        return;
      }

      if (event.key === "ArrowRight" || event.key === " ") {
        event.preventDefault();
        hasStarted ? nextSlide() : startExperience();
      }

      if (event.key === "ArrowLeft" && hasStarted) {
        event.preventDefault();
        previousSlide();
      }
    });

    setSlide(0, 1);
    requestAnimationFrame(animateProgress);
  </script>
</body>
</html>
